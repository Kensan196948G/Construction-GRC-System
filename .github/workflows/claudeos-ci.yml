name: ClaudeOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python dependencies
      run: |
        pip install ruff black isort
      working-directory: .

    - name: Python Lint (Ruff)
      run: |
        ruff check backend/ || true

    - name: Python Format Check (Black)
      run: |
        black --check backend/ || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc_user
          POSTGRES_PASSWORD: grc_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install -r backend/requirements.txt || true

    - name: Run Python Tests
      env:
        DATABASE_URL: postgresql://grc_user:grc_test_password@localhost:5432/grc_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd backend && python -m pytest tests/ -v --tb=short || true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend dependencies
      run: |
        cd frontend && npm install || true

    - name: Run Frontend Tests
      run: |
        cd frontend && npm test || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend && npm install && npm run build || true

    - name: Verify Docker Compose
      run: |
        docker compose config || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Security Check (pip-audit)
      run: |
        pip install pip-audit
        pip-audit -r backend/requirements.txt || true
