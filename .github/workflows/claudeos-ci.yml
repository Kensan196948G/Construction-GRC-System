name: ClaudeOS CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Python Lint Tools
      run: pip install ruff==0.8.4 black isort

    - name: Python Lint (Ruff)
      run: ruff check backend/

    - name: Python Format Check (Black)
      run: black --check backend/

    - name: Frontend Lint
      run: |
        cd frontend && npm install && npm run lint

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc_user
          POSTGRES_PASSWORD: grc_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install Python dependencies
      run: pip install -r backend/requirements.txt

    - name: Run Migrations
      env:
        DATABASE_URL: postgresql://grc_user:grc_test_password@localhost:5432/grc_test
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SETTINGS_MODULE: grc.settings.development
      run: cd backend && python manage.py migrate --no-input

    - name: Run Python Tests
      env:
        DATABASE_URL: postgresql://grc_user:grc_test_password@localhost:5432/grc_test
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SETTINGS_MODULE: grc.settings.development
      run: cd backend && python -m pytest tests/ -v --tb=short

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Frontend dependencies
      run: cd frontend && npm install

    - name: Run Frontend Tests
      run: cd frontend && npm test

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Build Frontend
      run: cd frontend && npm install && npm run build

    - name: Verify Docker Compose
      run: docker compose config

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Security Check (pip-audit)
      run: |
        pip install pip-audit
        pip-audit -r backend/requirements.txt || true

    - name: Python Security Scan (Bandit)
      run: |
        pip install bandit
        cd backend && bandit -r apps/ grc/ -c .bandit --format json || true

    - name: Frontend Security (npm audit)
      run: |
        cd frontend && npm install && npm audit --audit-level=high || true
