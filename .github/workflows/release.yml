name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Release Notes
      id: notes
      run: |
        # 前回のタグを取得
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log --oneline --pretty=format:"- %s" HEAD)
        else
          COMMITS=$(git log --oneline --pretty=format:"- %s" ${PREV_TAG}..HEAD)
        fi
        echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: |
          ## 🏗 Construction-GRC-System ${{ github.ref_name }}

          ### 変更内容
          ${{ steps.notes.outputs.COMMITS }}

          ### システム情報
          - Python 3.12 + Django 5.x + DRF
          - Vue.js 3 + TypeScript + Vuetify 3
          - PostgreSQL 16 + Redis 7 + Celery

          ---
          🤖 Generated by ClaudeOS CI
