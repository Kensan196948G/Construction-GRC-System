apiVersion: apps/v1
kind: Deployment
metadata:
  name: grc-frontend
  namespace: grc-system
  labels:
    app.kubernetes.io/name: grc-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: grc-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: grc-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grc-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: grc-system
    spec:
      containers:
        - name: frontend
          image: construction-grc-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
