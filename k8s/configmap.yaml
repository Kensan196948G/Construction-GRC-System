apiVersion: v1
kind: ConfigMap
metadata:
  name: grc-config
  namespace: grc-system
data:
  DJANGO_SETTINGS_MODULE: "grc.settings.production"
  ALLOWED_HOSTS: "grc.example.com,localhost"
  CORS_ALLOWED_ORIGINS: "https://grc.example.com"
  CELERY_TIMEZONE: "Asia/Tokyo"
  LANGUAGE_CODE: "ja"
  TIME_ZONE: "Asia/Tokyo"
  GUNICORN_WORKERS: "4"
  LOG_LEVEL: "INFO"
