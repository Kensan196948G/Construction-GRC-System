apiVersion: apps/v1
kind: Deployment
metadata:
  name: grc-backend
  namespace: grc-system
  labels:
    app.kubernetes.io/name: grc-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: grc-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: grc-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grc-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: grc-system
    spec:
      containers:
        - name: backend
          image: construction-grc-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: grc-config
            - secretRef:
                name: grc-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
