apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grc-backend-hpa
  namespace: grc-system
  labels:
    app.kubernetes.io/name: grc-backend-hpa
    app.kubernetes.io/part-of: grc-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grc-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grc-frontend-hpa
  namespace: grc-system
  labels:
    app.kubernetes.io/name: grc-frontend-hpa
    app.kubernetes.io/part-of: grc-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grc-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
